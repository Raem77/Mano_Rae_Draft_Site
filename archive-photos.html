<!DOCTYPE html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photos</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.cdnfonts.com/css/comico" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=jetbrains-mono@400,700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="overlay" id="overlay"></div>

  <img src="eye_open.png"
       class="reset-eye"
       id="resetEye"
       data-open="eye_open.png"
       data-closed="eye_closed.png">

  <!-- back -------------------------------------------->
  <a href="boxes.html" class="back-btn">← back</a>

<!----------------------------------------- Modal blah blah panel --------------------------------------------->
  <div class="modal-info" id="modalInfo">
    <span class="modal-title" id="modalTitle"></span>
    <span class="modal-date"  id="modalDate"></span>
    <span class="modal-desc"  id="modalDesc"></span>
  </div>

  <div class="archive-container">

    <div class="image-wrapper m24"
         data-title="Photo One"
         data-date="01 / 01 / 2024"
         data-desc="A quiet afternoon. The light was different that day.">
      <img src="images/photo_edited/1.png" class="memory">
    </div>

    <div class="image-wrapper m25"
         data-title="Photo Two"
         data-date="02 / 03 / 2024"
         data-desc="Something worth keeping. Found between two moments.">
      <img src="images/photo_edited/2.png" class="memory">
    </div>

    <div class="image-wrapper m26"
         data-title="Photo Three"
         data-date="14 / 04 / 2024"
         data-desc="Smaller than expected. Bigger in retrospect.">
      <img src="images/photo_edited/3.png" class="memory">
    </div>

    <div class="image-wrapper m27"
         data-title="Photo Four"
         data-date="22 / 05 / 2024"
         data-desc="The kind of place you only notice once it's gone.">
      <img src="images/photo_edited/4.png" class="memory">
    </div>

    <div class="image-wrapper m28"
         data-title="Photo Five"
         data-date="30 / 06 / 2024"
         data-desc="End of something. Beginning of something else.">
      <img src="images/photo_edited/5.png" class="memory">
    </div>

    <div class="image-wrapper m29"
         data-title="Photo Six"
         data-date="07 / 07 / 2024"
         data-desc="Wide. Open. Nothing needed to be said.">
      <img src="images/photo_edited/6.png" class="memory">
    </div>

    <div class="image-wrapper m30"
         data-title="Photo Seven"
         data-date="18 / 08 / 2024"
         data-desc="Shot on film. Waited three weeks to see it.">
      <img src="images/photo_edited/7.png" class="memory">
    </div>

    <div class="image-wrapper m31"
         data-title="Photo Eight"
         data-date="03 / 09 / 2024"
         data-desc="Written at 2am. Makes sense now.">
      <img src="images/photo_edited/8.png" class="memory">
    </div>

    <div class="image-wrapper m32"
         data-title="Photo Nine"
         data-date="11 / 09 / 2024"
         data-desc="A reminder that was never acted on.">
      <img src="images/photo_edited/9.png" class="memory">
    </div>

    <div class="image-wrapper m33"
         data-title="Photo Ten"
         data-date="19 / 09 / 2024"
         data-desc="Torn from a larger page. The rest is missing.">
      <img src="images/photo_edited/10.png" class="memory">
    </div>

    <div class="image-wrapper m34"
         data-title="Photo Eleven"
         data-date="25 / 09 / 2024"
         data-desc="Left on the table. Nobody moved it.">
      <img src="images/photo_edited/11.png" class="memory">
    </div>

    <div class="image-wrapper m35"
         data-title="Photo Twelve"
         data-date="01 / 10 / 2024"
         data-desc="Written fast. The pen was almost out of ink.">
      <img src="images/photo_edited/12.png" class="memory">
    </div>

    <div class="image-wrapper m36"
         data-title="Photo Thirteen"
         data-date="08 / 10 / 2024"
         data-desc="Folded once. Kept in a pocket for weeks.">
      <img src="images/photo_edited/13.png" class="memory">
    </div>

    <div class="image-wrapper m37"
         data-title="Photo Fourteen"
         data-date="15 / 10 / 2024"
         data-desc="The handwriting changed halfway through.">
      <img src="images/photo_edited/14.png" class="memory">
    </div>

    <div class="image-wrapper m38"
         data-title="Photo Fifteen"
         data-date="21 / 10 / 2024"
         data-desc="One word. That was enough.">
      <img src="images/photo_edited/15.png" class="memory">
    </div>

    <div class="image-wrapper m39"
         data-title="Photo Sixteen"
         data-date="29 / 10 / 2024"
         data-desc="Addressed to no one in particular.">
      <img src="images/photo_edited/16.png" class="memory">
    </div>

    <div class="image-wrapper m40"
         data-title="Photo Seventeen"
         data-date="05 / 11 / 2024"
         data-desc="Small paper. Big weight.">
      <img src="images/photo_edited/17.png" class="memory">
    </div>

    <div class="image-wrapper m41"
         data-title="Photo Eighteen"
         data-date="12 / 11 / 2024"
         data-desc="Found between two pages of an old book.">
      <img src="images/photo_edited/18.png" class="memory">
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
